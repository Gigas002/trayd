name: Deploy

# Fires automatically on every v* tag push.
# Can also be triggered manually via Actions → "Run workflow" for a smoke build
# (the GitHub Release and crates.io steps are skipped on manual runs).
on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:

permissions:
  contents: write # required to create GitHub Releases

env:
  CARGO_TERM_COLOR: always

jobs:
  build-trayd:
    name: Build trayd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Build cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build -p trayd --release

      - name: Strip and package
        run: |
          strip target/release/trayd
          VERSION="${GITHUB_REF_NAME:-dev}"
          tar -czf "trayd-${VERSION}-x86_64-linux.tar.gz" -C target/release trayd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trayd
          path: trayd-*.tar.gz

  build-trayctl:
    name: Build trayctl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Build cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build -p trayctl --release

      - name: Strip and package
        run: |
          strip target/release/trayctl
          VERSION="${GITHUB_REF_NAME:-dev}"
          tar -czf "trayctl-${VERSION}-x86_64-linux.tar.gz" -C target/release trayctl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trayctl
          path: trayctl-*.tar.gz

  build-tray-tui:
    name: Build tray-tui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Build cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build -p tray-tui --release

      - name: Strip and package
        run: |
          strip target/release/tray-tui
          VERSION="${GITHUB_REF_NAME:-dev}"
          tar -czf "tray-tui-${VERSION}-x86_64-linux.tar.gz" -C target/release tray-tui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tray-tui
          path: tray-tui-*.tar.gz

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-trayd, build-trayctl, build-tray-tui]
    if: github.event_name == 'push'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: "*.tar.gz"
          generate_release_notes: true

  # Requires the CARGO_REGISTRY_TOKEN secret — see README for setup.
  publish-crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: github-release
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish libtrayd
        run: cargo publish -p libtrayd
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
